      if (bonusResults.finalist && playerBonus.finalist === bonusResults.finalist) {

        total += BONUS_POINTS.finalist;
      }
      if (bonusResults.topScorer && playerBonus.topScorer && bonusResults.topScorer.toLowerCase().trim() === playerBonus.topScorer.toLowerCase().trim()) {
        breakdown.topScorer = BONUS_POINTS.topScorer;
        total += BONUS_POINTS.topScorer;
      }
      if (bonusResults.surprise && playerBonus.surprise === bonusResults.surprise) {
        breakdown.surprise = BONUS_POINTS.surprise;
        total += BONUS_POINTS.surprise;
      }
      if (bonusResults.mostGoalsAgainst && playerBonus.mostGoalsAgainst === bonusResults.mostGoalsAgainst) {
        breakdown.mostGoalsAgainst = BONUS_POINTS.mostGoalsAgainst;
        total += BONUS_POINTS.mostGoalsAgainst;
      }
      return { total, breakdown };
    }

      E: { bg: "rgba(22, 163, 74, 0.15)", border: "#16a34a", text: "#86efac" },
      F: { bg: "rgba(13, 148, 136, 0.15)", border: "#0d9488", text: "#5eead4" },
      G: { bg: "rgba(8, 145, 178, 0.15)", border: "#0891b2", text: "#67e8f9" },
      H: { bg: "rgba(37, 99, 235, 0.15)", border: "#2563eb", text: "#93c5fd" },

    };

    function useFirebase() {
      const [ready, setReady] = useState(!!window.__FB__);
      useEffect(() => {
        if (window.__FB__) { setReady(true); return; }
        const h = () => setReady(true);
        window.addEventListener("firebase-ready", h);
        return () => window.removeEventListener("firebase-ready", h);
      }, []);
      return ready;
    }

    async function fbSaveConfig(cfg) { const FB = window.__FB__; await FB.setDoc(FB.doc(FB.db, "meta", "config"), cfg); }
    async function fbSaveResults(r) { const FB = window.__FB__; await FB.setDoc(FB.doc(FB.db, "meta", "results"), r); }
    async function fbSaveBonusResults(r) { const FB = window.__FB__; await FB.setDoc(FB.doc(FB.db, "meta", "bonusResults"), r); }
    async function fbSavePlayer(p) { const FB = window.__FB__; await FB.setDoc(FB.doc(FB.db, "players", p.name.toLowerCase()), p); }
    async function fbDeletePlayer(name) { const FB = window.__FB__; await FB.deleteDoc(FB.doc(FB.db, "players", name.toLowerCase())); }

    function Toast(props) {
      const { toast, onClose } = props;
      useEffect(() => {
        if (!toast) return;
        const id = setTimeout(onClose, toast.type === "error" ? 4500 : 2500);
        return () => clearTimeout(id);
      }, [toast, onClose]);
      if (!toast) return null;
      const isErr = toast.type === "error";
      return (
        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[200] px-2 max-w-md w-full pointer-events-none">
          <div className={"pointer-events-auto rounded-lg px-4 py-3 shadow-2xl backdrop-blur flex items-start gap-3 border " + (isErr ? "bg-red-950/95 border-red-500/40 text-red-100" : "bg-emerald-950/95 border-emerald-500/40 text-emerald-100")} style={{ animation: "slideDown 0.2s ease-out" }}>
            <span className="shrink-0 mt-0.5">{isErr ? "⚠" : "✓"}</span>
            <div className="flex-1 text-sm">{toast.message}</div>
            <button onClick={onClose} className="text-stone-400 hover:text-white shrink-0">✕</button>
          </div>
        </div>
      );
    }

    function ConfirmDialog(props) {
      const { open, title, message, onConfirm, onCancel, danger } = props;
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-[150] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4" onClick={onCancel}>
          <div onClick={(e) => e.stopPropagation()} className="bg-stone-900 border border-stone-700 rounded-xl p-6 w-full max-w-sm">
            <h3 className="font-black tracking-widest text-lg mb-2" style={{fontFamily:'"Bebas Neue", sans-serif', letterSpacing:"0.1em"}}>{title}</h3>
            <p className="text-sm text-stone-300 mb-6">{message}</p>
            <div className="flex gap-2">
              <button onClick={onCancel} className="flex-1 py-2.5 bg-stone-800 hover:bg-stone-700 rounded-lg font-bold text-sm transition">ANULEAZĂ</button>
              <button onClick={onConfirm} className={"flex-1 py-2.5 font-black rounded-lg transition " + (danger ? "bg-red-500 hover:bg-red-400 text-white" : "bg-amber-400 hover:bg-amber-300 text-stone-950")} style={{fontFamily:'"Bebas Neue", sans-serif', letterSpacing:"0.1em"}}>CONFIRMĂ</button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const fbReady = useFirebase();
      const [view, setView] = useState("home");
      const [currentPlayer, setCurrentPlayer] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [config, setConfig] = useState({ adminPassword: "", deadline: DEFAULT_DEADLINE, scoring: DEFAULT_SCORING, initialized: false });
      const [players, setPlayers] = useState([]);
      const [results, setResults] = useState({});
      const [bonusResults, setBonusResults] = useState({});
      const [loading, setLoading] = useState(true);
      const [savingState, setSavingState] = useState("");
      const [toast, setToast] = useState(null);
      const [confirmDlg, setConfirmDlg] = useState(null);
      const [fatalError, setFatalError] = useState(null);

      const showToast = useCallback((message, type) => setToast({ message, type: type || "success" }), []);
      const askConfirm = useCallback((title, message, onConfirm, danger) => setConfirmDlg({ title, message, onConfirm, danger: !!danger }), []);

      useEffect(() => {
        if (!fbReady) return;
        const FB = window.__FB__;
        let configLoaded = false, playersLoaded = false;
        const checkLoaded = () => { if (configLoaded && playersLoaded) setLoading(false); };

        const u1 = FB.onSnapshot(FB.doc(FB.db, "meta", "config"), (snap) => {
          if (snap.exists()) setConfig((p) => ({ ...p, ...snap.data() }));
          configLoaded = true; checkLoaded();
        }, (err) => { console.error(err); setFatalError(err.message); setLoading(false); });

        const u2 = FB.onSnapshot(FB.doc(FB.db, "meta", "results"), (snap) => {
          setResults(snap.exists() ? snap.data() : {});
        }, (err) => console.error(err));

        const u3 = FB.onSnapshot(FB.collection(FB.db, "players"), (snap) => {
          const arr = []; snap.forEach((d) => arr.push(d.data()));
          setPlayers(arr);
          playersLoaded = true; checkLoaded();
        }, (err) => { console.error(err); setFatalError(err.message); setLoading(false); });

        const u4 = FB.onSnapshot(FB.doc(FB.db, "meta", "bonusResults"), (snap) => {
          setBonusResults(snap.exists() ? snap.data() : {});
        }, (err) => console.error(err));

        return () => { u1(); u2(); u3(); u4(); };
      }, [fbReady]);

      const wrapSave = async (fn) => {
        setSavingState("saving");
        try {
          await fn();
          setSavingState("saved");
          setTimeout(() => setSavingState(""), 1500);
          return true;
        } catch (e) {
          setSavingState("");
          showToast("Eroare la salvare: " + e.message, "error");
          return false;
        }
      };

      const saveConfig = (cfg) => wrapSave(() => fbSaveConfig(cfg));
      const savePlayer = (p) => wrapSave(() => fbSavePlayer(p));
      const deletePlayer = (n) => wrapSave(() => fbDeletePlayer(n));
      const saveResults = (r) => wrapSave(() => fbSaveResults(r));
      const saveBonusResults = (r) => wrapSave(() => fbSaveBonusResults(r));

      const isLocked = useMemo(() => {
        if (!config.deadline) return false;
        const d = new Date(config.deadline);
        return !isNaN(d.getTime()) && new Date() >= d;
      }, [config.deadline]);

      const standings = useMemo(() => {
        const arr = players.map((p) => {
          let matchTotal = 0, exact = 0, diff = 0, outcome = 0, wrong = 0, played = 0;
          for (const m of MATCHES) {
            const pred = p.predictions ? p.predictions[m.n] : null;
            const real = results[m.n];
            const pts = calcPoints(pred, real, config.scoring);
            if (pts == null) continue;
            played++; matchTotal += pts;
            if (pts === config.scoring.exact) exact++;
            else if (pts === config.scoring.diff) diff++;
            else if (pts === config.scoring.outcome) outcome++;
            else wrong++;
          }
          const bonus = calcBonusPoints(p.bonus, bonusResults);
          return { name: p.name, total: matchTotal + bonus.total, matchTotal, bonusTotal: bonus.total, bonusBreakdown: bonus.breakdown, exact, diff, outcome, wrong, played };
        });
        return arr.sort((a, b) => b.total - a.total || b.exact - a.exact || b.diff - a.diff);
      }, [players, results, bonusResults, config.scoring]);

      if (!fbReady || loading) return <div className="min-h-screen flex items-center justify-center"><div className="text-stone-400 font-mono text-sm tracking-widest animate-pulse">SE ÎNCARCĂ...</div></div>;

      if (fatalError) return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="max-w-md bg-red-950/40 border border-red-500/40 rounded-xl p-6">
            <div className="text-4xl mb-3">⚠️</div>
            <h2 className="text-xl font-black mb-2">EROARE CONECTARE</h2>
            <p className="text-sm text-stone-300 mb-4">Verifică regulile Firestore în consola Firebase.</p>
            <p className="text-xs font-mono text-red-300">{fatalError}</p>
          </div>
        </div>
      );

      if (!config.initialized) return (
        <>
          <SetupView onSave={async (cfg) => {
            const ok = await saveConfig({ ...cfg, initialized: true });
            if (ok) { setIsAdmin(true); setView("admin"); showToast("Concursul a fost inițializat! 🎉"); }
          }} showToast={showToast} />
          <Toast toast={toast} onClose={() => setToast(null)} />
        </>
      );

      return (
        <div className="min-h-screen text-stone-100" style={{ background: "radial-gradient(ellipse 80% 60% at 50% 0%, rgba(220, 38, 38, 0.15), transparent 60%), radial-gradient(ellipse 60% 80% at 100% 100%, rgba(37, 99, 235, 0.1), transparent 60%), linear-gradient(180deg, #0c0a09 0%, #0c0a09 100%)" }}>
          <Header view={view} setView={setView} currentPlayer={currentPlayer} setCurrentPlayer={setCurrentPlayer} isAdmin={isAdmin} isLocked={isLocked} savingState={savingState} />
          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-10 relative">
            {view === "home" && <HomeView config={config} isLocked={isLocked} players={players} standings={standings} setView={setView} currentPlayer={currentPlayer} setCurrentPlayer={setCurrentPlayer} savePlayer={savePlayer} isAdmin={isAdmin} setIsAdmin={setIsAdmin} adminPassword={config.adminPassword} showToast={showToast} />}
            {view === "predict" && currentPlayer && <PredictView player={currentPlayer} isLocked={isLocked} results={results} scoring={config.scoring} updatePlayer={(u) => { setCurrentPlayer(u); savePlayer(u); }} />}
            {view === "bonus" && currentPlayer && <BonusView player={currentPlayer} isLocked={isLocked} bonusResults={bonusResults} updatePlayer={(u) => { setCurrentPlayer(u); savePlayer(u); }} />}
            {view === "leaderboard" && <LeaderboardView standings={standings} players={players} results={results} bonusResults={bonusResults} scoring={config.scoring} />}
            {view === "admin" && isAdmin && <AdminView config={config} results={results} bonusResults={bonusResults} saveConfig={saveConfig} saveResults={saveResults} saveBonusResults={saveBonusResults} players={players} deletePlayer={deletePlayer} showToast={showToast} askConfirm={askConfirm} />}
          </main>
          <footer className="border-t border-stone-800 mt-16 py-6 text-center text-xs text-stone-500 font-mono tracking-widest">
            <span style={{fontFamily:'"Bebas Neue", sans-serif', fontSize: 16, letterSpacing: "0.1em"}}>WC26 PREDICTOR</span>
            <span className="mx-3 text-stone-700">·</span>72 MECIURI · GRUPELE A-L · 11–28 IUNIE 2026
          </footer>
          <Toast toast={toast} onClose={() => setToast(null)} />
          <ConfirmDialog open={!!confirmDlg} title={confirmDlg ? confirmDlg.title : ""} message={confirmDlg ? confirmDlg.message : ""} danger={confirmDlg ? confirmDlg.danger : false} onConfirm={() => { if (confirmDlg) confirmDlg.onConfirm(); setConfirmDlg(null); }} onCancel={() => setConfirmDlg(null)} />
        </div>
      );
    }

    function Header(props) {
      const { view, setView, currentPlayer, setCurrentPlayer, isAdmin, isLocked, savingState } = props;
      return (
        <header className="sticky top-0 z-50 backdrop-blur-xl bg-stone-950/80 border-b border-stone-800">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

                <div className="text-left">
                  <div className="font-black tracking-tight leading-none text-base sm:text-lg" style={{fontFamily:'"Bebas Neue", sans-serif', letterSpacing:"0.05em"}}>CUPA MONDIALĂ <span className="text-amber-400">'26</span></div>
                  <div className="text-[10px] text-stone-500 tracking-[0.25em] font-mono mt-0.5">PREDICTOR</div>
                </div>
              </button>
              <nav className="hidden md:flex items-center gap-1">
                <NavBtn active={view==="home"} onClick={() => setView("home")}>ACASĂ</NavBtn>
                {currentPlayer && <NavBtn active={view==="predict"} onClick={() => setView("predict")}>PRONOSTICURI</NavBtn>}
                {currentPlayer && <NavBtn active={view==="bonus"} onClick={() => setView("bonus")}>BONUS</NavBtn>}
                <NavBtn active={view==="leaderboard"} onClick={() => setView("leaderboard")}>CLASAMENT</NavBtn>

                {currentPlayer && <button onClick={() => { setCurrentPlayer(null); setView("home"); }} className="p-2 text-stone-400 hover:text-white" title="Ieșire">⎋</button>}

              <NavBtn active={view==="home"} onClick={() => setView("home")}>ACASĂ</NavBtn>

      );

    const inputStyleObj = { width: "100%", background: "rgba(15, 15, 17, 0.7)", border: "1px solid #44403c", borderRadius: "8px", padding: "12px 14px", color: "#fafaf9", fontSize: "16px", outline: "none", transition: "border-color 0.15s", fontFamily: '"DM Sans", system-ui, sans-serif', WebkitAppearance: "none", appearance: "none", boxSizing: "border-box" };

    function SetupView(props) {
      const { onSave, showToast } = props;
      const [pwd, setPwd] = useState("");
      const [pwd2, setPwd2] = useState("");
      const [deadline, setDeadline] = useState(DEFAULT_DEADLINE);
      const [exact, setExact] = useState(5);
      const [diff, setDiff] = useState(3);
      const [outcome, setOutcome] = useState(2);
      const [errors, setErrors] = useState({});
      const [submitting, setSubmitting] = useState(false);
      const submit = async () => {
        const e = {};
        if (!pwd || pwd.length < 4) e.pwd = "Parola trebuie să aibă cel puțin 4 caractere";
        if (pwd !== pwd2) e.pwd2 = "Parolele nu se potrivesc";
        if (!deadline) e.deadline = "Alege un deadline valid";
        if (Object.keys(e).length) { setErrors(e); showToast("Verifică câmpurile marcate cu roșu", "error"); return; }
        setErrors({}); setSubmitting(true);
        try { await onSave({ adminPassword: pwd, deadline, scoring: { exact: +exact || 5, diff: +diff || 3, outcome: +outcome || 2, wrong: 0 } }); }
        catch (err) { showToast("A apărut o eroare.", "error"); setSubmitting(false); }
      };
      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="max-w-xl w-full">

              <div className="text-xs tracking-[0.3em] text-stone-500 font-mono">CONFIGURARE INIȚIALĂ</div>
              <p className="text-sm text-stone-400 mt-4 max-w-md mx-auto">Tu ești organizatorul. Configurează concursul o dată, apoi trimite linkul colegilor.</p>
            </div>
            <div className="bg-stone-900/60 backdrop-blur border border-stone-800 rounded-xl p-6 sm:p-8 space-y-6">
              <div>
                <Label>PAROLĂ ADMIN <span className="text-red-400">*</span></Label>
                <div className="text-xs text-stone-500 mb-3">Cu ea introduci rezultatele meciurilor. NU o da nimănui.</div>
                <input type="password" value={pwd} onChange={(e) => { setPwd(e.target.value); setErrors((p) => ({...p, pwd: null})); }} placeholder="min. 4 caractere" style={{...inputStyleObj, borderColor: errors.pwd ? "#dc2626" : "#44403c"}} autoComplete="new-password" autoCapitalize="off" autoCorrect="off" />
                {errors.pwd && <div className="text-xs text-red-400 mt-1.5">⚠ {errors.pwd}</div>}
                <input type="password" value={pwd2} onChange={(e) => { setPwd2(e.target.value); setErrors((p) => ({...p, pwd2: null})); }} placeholder="confirmă parola" style={{...inputStyleObj, marginTop: "8px", borderColor: errors.pwd2 ? "#dc2626" : "#44403c"}} autoComplete="new-password" autoCapitalize="off" autoCorrect="off" />
                {errors.pwd2 && <div className="text-xs text-red-400 mt-1.5">⚠ {errors.pwd2}</div>}
              </div>
              <div>
                <Label>DEADLINE PRONOSTICURI</Label>
                <div className="text-xs text-stone-500 mb-3">După această oră, jucătorii nu mai pot edita pronosticurile.</div>
                <input type="datetime-local" value={deadline} onChange={(e) => { setDeadline(e.target.value); setErrors((p) => ({...p, deadline: null})); }} style={{...inputStyleObj, borderColor: errors.deadline ? "#dc2626" : "#44403c"}} />
                {errors.deadline && <div className="text-xs text-red-400 mt-1.5">⚠ {errors.deadline}</div>}
                <div className="text-xs text-stone-500 mt-1.5 font-mono">Recomandat: 11 iunie, 20:00</div>
              </div>
              <div>
                <Label>PUNCTAJE</Label>
                <div className="grid grid-cols-3 gap-3">
                  <ScoringInput label="Scor exact" value={exact} onChange={setExact} hint="2-1 → 2-1" color="amber" />
                  <ScoringInput label="Diferență" value={diff} onChange={setDiff} hint="2-1 → 3-2" color="emerald" />
                  <ScoringInput label="Rezultat 1X2" value={outcome} onChange={setOutcome} hint="2-1 → 4-0" color="sky" />
                </div>
              </div>
              <button type="button" onClick={submit} disabled={submitting} className="w-full py-4 bg-amber-400 text-stone-950 font-black tracking-widest rounded-lg hover:bg-amber-300 transition-colors disabled:opacity-60 active:bg-amber-500" style={{fontFamily:'"Bebas Neue", sans-serif', letterSpacing:"0.2em", fontSize: 16, touchAction: "manipulation"}}>{submitting ? "SE INIȚIALIZEAZĂ..." : "🚀 INIȚIALIZEAZĂ CONCURSUL"}</button>
            </div>
          </div>
        </div>
      );
    }

            <div className="text-3xl">💰</div>
            <div>

          {showRegister && <Modal onClose={() => setShowRegister(false)} title="ÎNSCRIERE NOUĂ"><RegisterForm players={players} showToast={showToast} onSubmit={async (name, password) => {
            const newPlayer = { name, password, predictions: {}, bonus: {} };

            if (ok) { setCurrentPlayer(newPlayer); setShowRegister(false); setView("predict"); showToast("Bun venit, " + name + "! 🎯"); }

          {showLogin && <Modal onClose={() => setShowLogin(false)} title="AUTENTIFICARE JUCĂTOR"><LoginForm players={players} showToast={showToast} onSubmit={(p) => { setCurrentPlayer(p); setShowLogin(false); setView("predict"); showToast("Salut, " + p.name + "!"); }} /></Modal>}
          {showAdminLogin && <Modal onClose={() => setShowAdminLogin(false)} title="ADMIN LOGIN"><AdminLoginForm adminPassword={adminPassword} showToast={showToast} onSubmit={() => { setIsAdmin(true); setShowAdminLogin(false); setView("admin"); showToast("Autentificare admin reușită"); }} /></Modal>}

    function CountdownPill(props) { return <div className="text-center"><div className="text-4xl sm:text-5xl font-black text-amber-400 leading-none" style={{fontFamily:'"Bebas Neue", sans-serif'}}>{String(props.value).padStart(2, "0")}</div><div className="text-[9px] tracking-[0.3em] text-stone-500 font-mono mt-1">{props.label}</div></div>; }

    function InfoCard(props) {

    function ScoringTile(props) { return <div className={"bg-gradient-to-br " + props.color + " rounded-lg p-4 text-stone-950"}><div className="text-5xl font-black leading-none" style={{fontFamily:'"Bebas Neue", sans-serif'}}>{props.pts}</div><div className="text-[10px] tracking-[0.2em] font-bold mt-2">{props.label}</div><div className="text-[10px] mt-1 opacity-70 font-mono">{props.desc}</div></div>; }

      return (
        <div className="bg-stone-900/80 border border-purple-500/30 rounded-lg p-3 flex items-center gap-3">

          <div className="min-w-0">
            <div className="text-xs font-bold tracking-wide truncate">{props.label}</div>

          </div>

    function RegisterForm(props) {
      const { players, onSubmit, showToast } = props;
      const [name, setName] = useState("");
      const [pwd, setPwd] = useState("");
      const [submitting, setSubmitting] = useState(false);
      const submit = async () => {
        const trimmed = name.trim();
        if (trimmed.length < 2) { showToast("Numele trebuie să aibă cel puțin 2 caractere", "error"); return; }
        if (players.some((p) => p.name.toLowerCase() === trimmed.toLowerCase())) { showToast("Există deja un jucător cu acest nume", "error"); return; }
        if (pwd.length < 3) { showToast("Parola trebuie să aibă cel puțin 3 caractere", "error"); return; }
        setSubmitting(true);
        await onSubmit(trimmed, pwd);
        setSubmitting(false);
      };
      return (
        <div className="space-y-4">
          <p className="text-sm text-stone-400">Alege un nume și o parolă personală.</p>
          <div><Label>NUMELE TĂU</Label><input value={name} onChange={(e) => setName(e.target.value)} placeholder="ex: Vlad" style={inputStyleObj} autoFocus autoCapitalize="words" autoCorrect="off" /></div>
          <div><Label>PAROLĂ PERSONALĂ</Label><input type="password" value={pwd} onChange={(e) => setPwd(e.target.value)} placeholder="min. 3 caractere" style={inputStyleObj} onKeyDown={(e) => e.key==="Enter" && submit()} autoComplete="new-password" autoCapitalize="off" autoCorrect="off" /></div>
          <button type="button" onClick={submit} disabled={submitting} className="w-full py-3 bg-amber-400 text-stone-950 font-black rounded-lg hover:bg-amber-300 transition-colors disabled:opacity-60" style={{fontFamily:'"Bebas Neue", sans-serif', letterSpacing:"0.15em"}}>{submitting ? "SE ÎNSCRIE..." : "ÎNSCRIE-MĂ →"}</button>
        </div>
      );
    }

    function LoginForm(props) {
      const { players, onSubmit, showToast } = props;
      const [name, setName] = useState("");
      const [pwd, setPwd] = useState("");
      const submit = () => {
        const player = players.find((p) => p.name.toLowerCase() === name.trim().toLowerCase() && p.password === pwd);
        if (!player) { showToast("Nume sau parolă incorectă", "error"); return; }
        onSubmit(player);
      };
      return (
        <div className="space-y-4">
          <div><Label>NUMELE TĂU</Label><select value={name} onChange={(e) => setName(e.target.value)} style={inputStyleObj}><option value="">— alege —</option>{players.map((p) => <option key={p.name} value={p.name}>{p.name}</option>)}</select></div>
          <div><Label>PAROLĂ</Label><input type="password" value={pwd} onChange={(e) => setPwd(e.target.value)} style={inputStyleObj} onKeyDown={(e) => e.key==="Enter" && submit()} autoComplete="current-password" /></div>
          <button type="button" onClick={submit} className="w-full py-3 bg-amber-400 text-stone-950 font-black rounded-lg hover:bg-amber-300 transition-colors" style={{fontFamily:'"Bebas Neue", sans-serif', letterSpacing:"0.15em"}}>INTRĂ →</button>
        </div>
      );
    }

    function AdminLoginForm(props) {
      const { adminPassword, onSubmit, showToast } = props;
      const [pwd, setPwd] = useState("");
      const submit = () => { if (pwd === adminPassword) onSubmit(); else showToast("Parolă incorectă", "error"); };
      return (
        <div className="space-y-4">
          <p className="text-sm text-stone-400">Parola admin pentru a introduce rezultatele meciurilor.</p>
          <input type="password" value={pwd} onChange={(e) => setPwd(e.target.value)} placeholder="parola admin" style={inputStyleObj} autoFocus onKeyDown={(e) => e.key==="Enter" && submit()} autoComplete="current-password" />
          <button type="button" onClick={submit} className="w-full py-3 bg-amber-400 text-stone-950 font-black rounded-lg hover:bg-amber-300 transition-colors" style={{fontFamily:'"Bebas Neue", sans-serif', letterSpacing:"0.15em"}}>AUTENTIFICĂ-TE →</button>
        </div>
      );
    }

    function Modal(props) {
      return (
        <div className="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4" onClick={props.onClose}>
          <div onClick={(e) => e.stopPropagation()} className="bg-stone-900 border border-stone-700 rounded-xl p-6 w-full max-w-md">
            <div className="flex items-center justify-between mb-5"><h2 className="font-black tracking-widest text-lg" style={{fontFamily:'"Bebas Neue", sans-serif', letterSpacing:"0.15em"}}>{props.title}</h2><button type="button" onClick={props.onClose} className="text-stone-500 hover:text-white p-2 -m-2">✕</button></div>
            {props.children}
          </div>
        </div>
      );
    }

    function PredictView(props) {
      const { player, isLocked, results, scoring, updatePlayer } = props;
      const [filter, setFilter] = useState("all");
      const [search, setSearch] = useState("");
      const filtered = MATCHES.filter((m) => {
        if (filter !== "all" && m.g !== filter) return false;
        if (search && !(m.e1 + " " + m.e2).toLowerCase().includes(search.toLowerCase())) return false;
        return true;
      });
      const completed = MATCHES.filter((m) => { const p = player.predictions ? player.predictions[m.n] : null; return p && p.g1 !== "" && p.g2 !== "" && p.g1 != null && p.g2 != null; }).length;
      const updatePred = (matchN, field, value) => {
        if (isLocked) return;
        const v = value === "" ? "" : Math.max(0, Math.min(15, parseInt(value) || 0));
        const newPreds = { ...(player.predictions || {}) };
        newPreds[matchN] = { ...(newPreds[matchN] || {}), [field]: v };
        updatePlayer({ ...player, predictions: newPreds });
      };
      return (
        <div className="space-y-6">
          <div className="flex flex-col sm:flex-row sm:items-end justify-between gap-4">
            <div>
              <div className="text-xs tracking-[0.25em] text-amber-400 font-mono">PRONOSTICURI · {player.name.toUpperCase()}</div>

              <p className="text-stone-400 mt-2 text-sm">{isLocked ? <span className="text-red-400">🔒 Pronosticurile sunt închise.</span> : <>Completează pronosticuri pentru cele 72 de meciuri. <span className="text-amber-400 font-bold">{completed}/72</span> completate.</>}</p>
            </div>
            {!isLocked && <div className="bg-stone-900 border border-stone-800 rounded-lg px-4 py-3 min-w-[180px]"><div className="flex justify-between text-[10px] tracking-widest font-mono text-stone-500 mb-1"><span>PROGRES</span><span>{Math.round(completed/72*100)}%</span></div><div className="h-2 bg-stone-800 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-amber-400 to-orange-400 transition-all" style={{width: (completed/72*100) + "%"}}/></div></div>}
          </div>
          <div className="bg-purple-900/20 border border-purple-500/30 rounded-lg p-4 flex items-center gap-3">
            <span className="text-2xl">⭐</span>
            <div className="flex-1 text-sm">Nu uita să completezi și <span className="font-bold text-purple-300">întrebările bonus</span> pentru până la 62 puncte extra!</div>
          </div>
          <div className="space-y-2">
            <input type="search" placeholder="caută echipă..." value={search} onChange={(e) => setSearch(e.target.value)} className="w-full sm:w-64 bg-stone-800 border border-stone-700 rounded-md px-3 py-2 text-sm outline-none focus:border-amber-400" style={{fontSize:16}} />
            <div className="flex gap-2 overflow-x-auto -mx-4 px-4 sm:mx-0 sm:px-0 sm:flex-wrap pb-1 no-scrollbar">
              <button type="button" onClick={() => setFilter("all")} className={"px-3 py-1.5 rounded-md text-xs font-bold tracking-widest whitespace-nowrap shrink-0 " + (filter==="all" ? "bg-amber-400 text-stone-950" : "bg-stone-800 text-stone-400")} style={{fontFamily:'"Bebas Neue", sans-serif'}}>TOATE</button>
              {["A","B","C","D","E","F","G","H","I","J","K","L"].map((g) => <button type="button" key={g} onClick={() => setFilter(g)} className={"px-3 py-1.5 rounded-md text-xs font-bold tracking-widest whitespace-nowrap shrink-0 " + (filter===g ? "text-stone-950" : "text-stone-400")} style={{fontFamily:'"Bebas Neue", sans-serif', backgroundColor: filter===g ? groupColors[g].border : "transparent", border: "1px solid " + groupColors[g].border}}>GR. {g}</button>)}
            </div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">{filtered.map((m) => <MatchCard key={m.n} match={m} pred={player.predictions ? player.predictions[m.n] : null} real={results[m.n]} scoring={scoring} isLocked={isLocked} onUpdate={updatePred} />)}</div>
          {filtered.length === 0 && <div className="text-center py-12 text-stone-500">Niciun meci găsit.</div>}
        </div>
      );
    }

    function MatchCard(props) {
      const { match: m, pred, real, scoring, isLocked, onUpdate } = props;
      const c = groupColors[m.g];
      const points = calcPoints(pred, real, scoring);
      const hasResult = real && real.g1 !== "" && real.g2 !== "" && real.g1 != null && real.g2 != null;
      let pointBadge = null;
      if (points != null) {
        let bg = "bg-stone-700 text-stone-300";
        if (points === scoring.exact) bg = "bg-amber-400 text-stone-950";
        else if (points === scoring.diff) bg = "bg-emerald-500 text-stone-950";
        else if (points === scoring.outcome) bg = "bg-sky-500 text-white";
        pointBadge = <div className={bg + " px-2 py-1 rounded text-xs font-black"} style={{fontFamily:'"Bebas Neue", sans-serif'}}>+{points} PCT</div>;

      const inputBg = isLocked ? "#1c1917" : "#fef3c7";
      const inputColor = isLocked ? "#fef3c7" : "#0c0a09";

            <div className="flex items-center gap-3"><span className="text-2xl shrink-0 w-8 text-center">{m.f2}</span><span className="font-bold text-sm flex-1 min-w-0 truncate">{m.e2}</span><input type="number" inputMode="numeric" min="0" max="15" value={pred ? (pred.g2 != null ? pred.g2 : "") : ""} onChange={(e) => onUpdate(m.n, "g2", e.target.value)} disabled={isLocked} placeholder="-" className="w-14 h-12 text-center rounded-lg font-black text-xl outline-none transition disabled:opacity-60 shrink-0" style={{ fontFamily:'"Bebas Neue", sans-serif', backgroundColor: inputBg, color: inputColor, border: inputBorder, WebkitAppearance:"none" }} /></div>

        </div>
      );
    }

    function BonusView(props) {
      const { player, isLocked, bonusResults, updatePlayer } = props;
      const [topScorerMode, setTopScorerMode] = useState(() => {
        const ts = player.bonus && player.bonus.topScorer;
        if (!ts) return "list";
        return TOP_SCORERS.includes(ts) ? "list" : "custom";
      });
      const bonus = player.bonus || {};

      const updateBonus = (field, value) => {
        if (isLocked) return;
        updatePlayer({ ...player, bonus: { ...bonus, [field]: value } });
      };

      // La finalistă, exclud câștigătorul
      const finalistOptions = bonus.champion ? TEAMS.filter((t) => t.name !== bonus.champion) : TEAMS;

      const fieldStatus = (field) => {
        if (!bonusResults[field]) return null;
        if (field === "topScorer") {
          const userVal = (bonus[field] || "").toLowerCase().trim();
          const realVal = bonusResults[field].toLowerCase().trim();
          return userVal === realVal ? "win" : "lose";
        }
        return bonus[field] === bonusResults[field] ? "win" : "lose";
      };

      return (
        <div className="space-y-6">
          <div>
            <div className="text-xs tracking-[0.25em] text-purple-400 font-mono">⭐ ÎNTREBĂRI BONUS · {player.name.toUpperCase()}</div>
            <h2 className="text-3xl sm:text-4xl font-black mt-1" style={{fontFamily:'"Bebas Neue", sans-serif', letterSpacing:"0.02em"}}>PARIAZĂ-ȚI <span className="text-purple-400">ȘANSELE</span></h2>
            <p className="text-stone-400 mt-2 text-sm">{isLocked ? <span className="text-red-400">🔒 Răspunsurile sunt blocate.</span> : <>5 întrebări = până la <span className="font-bold text-purple-300">62 puncte bonus</span>. Salvare automată.</>}</p>
          </div>

          <BonusQuestion num={1} pts={BONUS_POINTS.champion} title="CÂȘTIGĂTORUL TURNEULUI" desc="Cine va lua trofeul Cupei Mondiale 2026?" status={fieldStatus("champion")} realAnswer={bonusResults.champion}>
            <select value={bonus.champion || ""} onChange={(e) => updateBonus("champion", e.target.value)} disabled={isLocked} style={inputStyleObj}>
              <option value="">— alege echipa —</option>
              {TEAMS.map((t) => <option key={t.name} value={t.name}>{t.flag} {t.name}</option>)}
            </select>
          </BonusQuestion>

          <BonusQuestion num={2} pts={BONUS_POINTS.finalist} title="FINALISTA ÎNVINSĂ" desc="Cine va pierde finala (locul 2)?" status={fieldStatus("finalist")} realAnswer={bonusResults.finalist}>
            <select value={bonus.finalist || ""} onChange={(e) => updateBonus("finalist", e.target.value)} disabled={isLocked} style={inputStyleObj}>
              <option value="">— alege echipa —</option>
              {finalistOptions.map((t) => <option key={t.name} value={t.name}>{t.flag} {t.name}</option>)}
            </select>
            {!bonus.champion && !isLocked && <div className="text-[11px] text-amber-300/70 mt-2">💡 Alege întâi câștigătorul ca să excluzi auto această echipă</div>}
          </BonusQuestion>

          <BonusQuestion num={3} pts={BONUS_POINTS.topScorer} title="GOLGHETER TURNEU" desc="Cel mai bun marcator al turneului (gheata de aur)" status={fieldStatus("topScorer")} realAnswer={bonusResults.topScorer}>
            <div className="space-y-3">
              <div className="flex gap-2">
                <button type="button" onClick={() => setTopScorerMode("list")} disabled={isLocked} className={"flex-1 px-3 py-2 rounded-md text-xs font-bold tracking-widest transition " + (topScorerMode === "list" ? "bg-purple-500 text-white" : "bg-stone-800 text-stone-400")} style={{fontFamily:'"Bebas Neue", sans-serif'}}>DIN LISTĂ ({TOP_SCORERS.length} favoriți)</button>
                <button type="button" onClick={() => setTopScorerMode("custom")} disabled={isLocked} className={"flex-1 px-3 py-2 rounded-md text-xs font-bold tracking-widest transition " + (topScorerMode === "custom" ? "bg-purple-500 text-white" : "bg-stone-800 text-stone-400")} style={{fontFamily:'"Bebas Neue", sans-serif'}}>ALT JUCĂTOR (text liber)</button>
              </div>
              {topScorerMode === "list" ? (
                <select value={TOP_SCORERS.includes(bonus.topScorer || "") ? bonus.topScorer : ""} onChange={(e) => updateBonus("topScorer", e.target.value)} disabled={isLocked} style={inputStyleObj}>
                  <option value="">— alege jucător —</option>
                  {TOP_SCORERS.map((p) => <option key={p} value={p}>{p}</option>)}
                </select>
              ) : (
                <input value={!TOP_SCORERS.includes(bonus.topScorer || "") ? (bonus.topScorer || "") : ""} onChange={(e) => updateBonus("topScorer", e.target.value)} disabled={isLocked} placeholder="ex: Cristiano Ronaldo" style={inputStyleObj} />
              )}
            </div>
          </BonusQuestion>

          <BonusQuestion num={4} pts={BONUS_POINTS.surprise} title="ECHIPA SURPRIZĂ" desc="Echipa non-favorită care va ajunge în semifinale (NU una din top 8: Argentina, Brazilia, Franța, Anglia, Spania, Germania, Portugalia, Olanda)" status={fieldStatus("surprise")} realAnswer={bonusResults.surprise}>
            <select value={bonus.surprise || ""} onChange={(e) => updateBonus("surprise", e.target.value)} disabled={isLocked} style={inputStyleObj}>
              <option value="">— alege echipa —</option>
              {TEAMS.filter((t) => !FAVORITE_TEAMS.includes(t.name)).map((t) => <option key={t.name} value={t.name}>{t.flag} {t.name}</option>)}
            </select>
          </BonusQuestion>

          <BonusQuestion num={5} pts={BONUS_POINTS.mostGoalsAgainst} title="GOLURI PRIMITE ÎN GRUPE" desc="Echipa cu cele mai multe goluri primite în faza grupelor" status={fieldStatus("mostGoalsAgainst")} realAnswer={bonusResults.mostGoalsAgainst}>
            <select value={bonus.mostGoalsAgainst || ""} onChange={(e) => updateBonus("mostGoalsAgainst", e.target.value)} disabled={isLocked} style={inputStyleObj}>
              <option value="">— alege echipa —</option>
              {TEAMS.map((t) => <option key={t.name} value={t.name}>{t.flag} {t.name}</option>)}
            </select>
          </BonusQuestion>
        </div>
      );
    }

      const statusBg = status === "win" ? "border-emerald-500/40 bg-emerald-500/5" : status === "lose" ? "border-red-500/30 bg-red-500/5" : "border-stone-800";

              <div className="w-8 h-8 rounded-md bg-purple-500/20 border border-purple-500/40 flex items-center justify-center font-black text-purple-300" style={{fontFamily:'"Bebas Neue", sans-serif'}}>{num}</div>

            </div>
          </div>
          {children}
          {realAnswer && (
            <div className="mt-3 pt-3 border-t border-stone-800 flex items-center justify-between text-xs">
              <div><span className="text-stone-500 font-mono tracking-widest text-[10px] mr-2">RĂSPUNS CORECT:</span><span className="font-bold text-emerald-400">{realAnswer}</span></div>
              {status === "win" && <span className="bg-emerald-500 text-stone-950 px-2 py-1 rounded font-black" style={{fontFamily:'"Bebas Neue", sans-serif'}}>+{pts} PCT ✓</span>}
              {status === "lose" && <span className="bg-red-500/20 text-red-400 px-2 py-1 rounded font-bold">0 PCT ✗</span>}
            </div>
          )}
        </div>
      );
    }

    function LeaderboardView(props) {

      return (
        <div className="space-y-6">
          <div>
            <div className="text-xs tracking-[0.25em] text-amber-400 font-mono">CLASAMENT GENERAL</div>

            <p className="text-stone-400 text-sm mt-2">{matchesPlayed}/72 meciuri jucate · {players.length} jucători înscriși</p>

                <div>LOC</div><div>JUCĂTOR</div><div className="text-center">EXACTE</div><div className="text-center">DIFER.</div><div className="text-center">1X2</div><div className="text-center">GREȘ.</div><div className="text-center text-purple-400">BONUS</div><div className="text-right">TOTAL</div>

                      <div className="hidden sm:grid grid-cols-[60px,1fr,80px,80px,80px,80px,80px,100px] gap-2 items-center">
                        <div><div className={"w-9 h-9 flex items-center justify-center rounded-md font-black " + (i === 0 ? "bg-amber-400 text-stone-950" : i === 1 ? "bg-stone-300 text-stone-950" : isLast ? "bg-red-500/20 text-red-300" : "bg-stone-800 text-stone-400")} style={{fontFamily:'"Bebas Neue", sans-serif', fontSize: 18}}>{i + 1}</div></div>
                        <div className="flex items-center gap-2 min-w-0"><div className="font-bold truncate">{s.name}</div>{i === 0 && s.played > 0 && <span className="text-lg">👑</span>}{isLast && s.played > 0 && <span className="text-lg" title="Wooden Spoon - locul ultimul">🥄</span>}</div>
                        <div className="text-center"><span className="text-amber-400 font-bold">{s.exact}</span></div>

                      <div className="sm:hidden flex items-center gap-3">
                        <div className={"w-10 h-10 flex items-center justify-center rounded-md font-black shrink-0 " + (i === 0 ? "bg-amber-400 text-stone-950" : i === 1 ? "bg-stone-300 text-stone-950" : isLast ? "bg-red-500/20 text-red-300" : "bg-stone-800 text-stone-400")} style={{fontFamily:'"Bebas Neue", sans-serif', fontSize: 18}}>{i + 1}</div>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-1.5"><div className="font-bold truncate">{s.name}</div>{i === 0 && s.played > 0 && <span>👑</span>}{isLast && s.played > 0 && <span>🥄</span>}</div>

                        <div className="flex items-center gap-2 shrink-0">

                    {showDetail === s.name && player && <PlayerDetail player={player} results={results} bonusResults={bonusResults} scoring={scoring} standing={s} />}
                  </div>
                );
              })}
            </div>}
        </div>
      );
    }

    function PlayerDetail(props) {
      const { player, results, bonusResults, scoring, standing } = props;
      const bonus = player.bonus || {};
      const hasBonusAnswered = bonus.champion || bonus.finalist || bonus.topScorer || bonus.surprise || bonus.mostGoalsAgainst;
      return (
        <div className="bg-stone-950/50 border-b border-stone-800 px-4 py-4 space-y-4">
          {hasBonusAnswered && (
            <div>
              <div className="text-xs tracking-widest font-mono text-purple-400 mb-2">⭐ RĂSPUNSURI BONUS · {standing.bonusTotal} PCT</div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                {bonus.champion && <BonusDetailRow label="🏆 Câștigător" answer={bonus.champion} pts={standing.bonusBreakdown.champion} maxPts={BONUS_POINTS.champion} realAnswer={bonusResults.champion} />}

                {bonus.topScorer && <BonusDetailRow label="⚽ Golgheter" answer={bonus.topScorer} pts={standing.bonusBreakdown.topScorer} maxPts={BONUS_POINTS.topScorer} realAnswer={bonusResults.topScorer} />}
                {bonus.surprise && <BonusDetailRow label="✨ Echipa surpriză" answer={bonus.surprise} pts={standing.bonusBreakdown.surprise} maxPts={BONUS_POINTS.surprise} realAnswer={bonusResults.surprise} />}
                {bonus.mostGoalsAgainst && <BonusDetailRow label="🥅 Cele mai multe goluri primite" answer={bonus.mostGoalsAgainst} pts={standing.bonusBreakdown.mostGoalsAgainst} maxPts={BONUS_POINTS.mostGoalsAgainst} realAnswer={bonusResults.mostGoalsAgainst} />}
              </div>
            </div>
          )}
          <div>
            <div className="text-xs tracking-widest font-mono text-stone-500 mb-2">PRONOSTICURI MECIURI · {standing.matchTotal} PCT</div>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
              {MATCHES.map((m) => {
                const pred = player.predictions ? player.predictions[m.n] : null;
                const real = results[m.n];

                let badge = "";
                if (pts === scoring.exact) badge = "bg-amber-400 text-stone-950";

                else if (pts === scoring.outcome) badge = "bg-sky-500 text-white";
                else if (pts === scoring.wrong) badge = "bg-stone-700 text-stone-400";
                return (
                  <div key={m.n} className="bg-stone-900 border rounded-md px-2.5 py-1.5 text-xs flex items-center justify-between gap-2" style={{borderColor: c.border + "40"}}>
                    <div className="flex items-center gap-2 min-w-0"><span className="text-[9px] font-mono text-stone-500">M{m.n}</span><span className="truncate text-stone-300 text-[11px]">{m.f1}{m.e1.slice(0,3)} – {m.e2.slice(0,3)}{m.f2}</span></div>
                    <div className="flex items-center gap-1.5 shrink-0"><span className="font-mono font-bold text-stone-200">{pred && pred.g1 != null ? pred.g1 : "–"}-{pred && pred.g2 != null ? pred.g2 : "–"}</span>{real && real.g1 != null && real.g2 != null && <span className="font-mono text-emerald-400">[{real.g1}-{real.g2}]</span>}{pts != null && <span className={badge + " px-1.5 rounded text-[10px] font-black"}>+{pts}</span>}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function BonusDetailRow(props) {
      const { label, answer, pts, maxPts, realAnswer } = props;
      const won = pts > 0;
      return (
        <div className={"bg-stone-900 border rounded-md px-3 py-2 text-xs " + (won ? "border-emerald-500/40" : realAnswer ? "border-red-500/30" : "border-purple-500/20")}>
          <div className="flex items-center justify-between gap-2 mb-1">
            <span className="text-stone-400 font-mono text-[10px]">{label}</span>
            {realAnswer && (won ? <span className="bg-emerald-500 text-stone-950 px-1.5 rounded text-[10px] font-black">+{pts}</span> : <span className="bg-red-500/20 text-red-400 px-1.5 rounded text-[10px] font-bold">0/{maxPts}</span>)}
            {!realAnswer && <span className="text-purple-300 font-bold text-[10px]">{maxPts} pct</span>}

          <div className="font-bold text-stone-200 text-[11px] truncate">{answer}</div>
          {realAnswer && realAnswer !== answer && <div className="text-[10px] text-emerald-400 mt-0.5 truncate">→ corect: {realAnswer}</div>}
        </div>
      );
    }

      const { results, saveResults, showToast } = props;
      const [filter, setFilter] = useState("all");
      const [pendingResults, setPendingResults] = useState(results);
      const [dirty, setDirty] = useState(false);
      useEffect(() => { setPendingResults(results); setDirty(false); }, [results]);
      const update = (n, field, value) => {
        const v = value === "" ? "" : Math.max(0, Math.min(15, parseInt(value) || 0));
        setPendingResults((prev) => ({ ...prev, [n]: { ...(prev[n] || {}), [field]: v } }));
        setDirty(true);
      };
      const save = async () => {
        const clean = {};
        for (const k in pendingResults) {
          const v = pendingResults[k];
          if (v && v.g1 !== "" && v.g2 !== "" && v.g1 != null && v.g2 != null) clean[k] = { g1: +v.g1, g2: +v.g2 };
        }
        const ok = await saveResults(clean);
        if (ok) { setDirty(false); showToast("Rezultate salvate. Punctajele s-au actualizat."); }
      };
      const filtered = MATCHES.filter((m) => filter === "all" || m.g === filter);
      const completed = MATCHES.filter((m) => pendingResults[m.n] && pendingResults[m.n].g1 !== "" && pendingResults[m.n].g2 !== "" && pendingResults[m.n].g1 != null && pendingResults[m.n].g2 != null).length;
      return (
        <div className="space-y-4">
          <div className="bg-emerald-500/10 border border-emerald-500/30 rounded-lg p-4 flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
            <div><div className="font-bold text-emerald-300">📊 {completed}/72 meciuri completate</div><div className="text-xs text-stone-400 mt-1">Punctajele se actualizează automat după salvare.</div></div>
            {dirty && <button type="button" onClick={save} className="bg-amber-400 text-stone-950 px-5 py-2.5 rounded-lg font-black hover:bg-amber-300 transition flex items-center gap-2 shrink-0" style={{fontFamily:'"Bebas Neue", sans-serif', letterSpacing:"0.15em"}}>💾 SALVEAZĂ</button>}
          </div>
          <div className="flex gap-2 overflow-x-auto -mx-4 px-4 sm:mx-0 sm:px-0 sm:flex-wrap pb-1 no-scrollbar">
            <button type="button" onClick={() => setFilter("all")} className={"px-3 py-1.5 rounded-md text-xs font-bold tracking-widest whitespace-nowrap shrink-0 " + (filter==="all" ? "bg-amber-400 text-stone-950" : "bg-stone-800 text-stone-400")} style={{fontFamily:'"Bebas Neue", sans-serif'}}>TOATE</button>
            {["A","B","C","D","E","F","G","H","I","J","K","L"].map((g) => <button type="button" key={g} onClick={() => setFilter(g)} className={"px-3 py-1.5 rounded-md text-xs font-bold tracking-widest whitespace-nowrap shrink-0 " + (filter===g ? "text-stone-950" : "text-stone-400")} style={{fontFamily:'"Bebas Neue", sans-serif', backgroundColor: filter===g ? groupColors[g].border : "transparent", border: "1px solid " + groupColors[g].border}}>GR. {g}</button>)}
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            {filtered.map((m) => {
              const r = pendingResults[m.n];
              const c = groupColors[m.g];
              return (
                <div key={m.n} className="rounded-xl border bg-stone-900/60 p-4" style={{borderColor: c.border + "40"}}>
                  <div className="flex items-center justify-between mb-3"><span className="px-2 py-0.5 text-[10px] font-black rounded font-mono tracking-widest" style={{backgroundColor: c.bg, color: c.text}}>GR. {m.g} · M{m.n}</span><span className="text-[10px] text-stone-500 font-mono">{m.d} · {m.t}</span></div>
                  <div className="space-y-2">
                    <div className="flex items-center gap-3"><span className="text-2xl shrink-0 w-8 text-center">{m.f1}</span><span className="font-bold text-sm flex-1 min-w-0 truncate">{m.e1}</span><input type="number" inputMode="numeric" min="0" max="15" value={r && r.g1 != null ? r.g1 : ""} onChange={(e) => update(m.n, "g1", e.target.value)} placeholder="–" className="w-14 h-12 text-center rounded-lg font-black text-xl outline-none shrink-0" style={{fontFamily:'"Bebas Neue", sans-serif', backgroundColor:"#dcfce7", color:"#0c0a09", border:"2px solid #22c55e", WebkitAppearance:"none"}} /></div>
                    <div className="flex items-center gap-3"><span className="text-2xl shrink-0 w-8 text-center">{m.f2}</span><span className="font-bold text-sm flex-1 min-w-0 truncate">{m.e2}</span><input type="number" inputMode="numeric" min="0" max="15" value={r && r.g2 != null ? r.g2 : ""} onChange={(e) => update(m.n, "g2", e.target.value)} placeholder="–" className="w-14 h-12 text-center rounded-lg font-black text-xl outline-none shrink-0" style={{fontFamily:'"Bebas Neue", sans-serif', backgroundColor:"#dcfce7", color:"#0c0a09", border:"2px solid #22c55e", WebkitAppearance:"none"}} /></div>
                  </div>
                </div>
              );
            })}
          </div>
          {dirty && <div className="sticky bottom-4 flex justify-end"><button type="button" onClick={save} className="bg-amber-400 text-stone-950 px-6 py-3 rounded-lg font-black hover:bg-amber-300 transition flex items-center gap-2 shadow-2xl shadow-amber-500/30" style={{fontFamily:'"Bebas Neue", sans-serif', letterSpacing:"0.2em"}}>💾 SALVEAZĂ MODIFICĂRILE</button></div>}
        </div>
      );
    }

    function AdminBonus(props) {
      const { bonusResults, saveBonusResults, showToast } = props;
      const [pending, setPending] = useState(bonusResults);
      const [dirty, setDirty] = useState(false);
      useEffect(() => { setPending(bonusResults); setDirty(false); }, [bonusResults]);
      const update = (field, value) => { setPending((p) => ({ ...p, [field]: value })); setDirty(true); };
      const save = async () => {
        const clean = {};
        for (const k of ["champion", "finalist", "topScorer", "surprise", "mostGoalsAgainst"]) {
          if (pending[k]) clean[k] = pending[k];
        }
        const ok = await saveBonusResults(clean);
        if (ok) { setDirty(false); showToast("Rezultate bonus salvate."); }
      };
      return (
        <div className="space-y-4">
          <div className="bg-purple-500/10 border border-purple-500/30 rounded-lg p-4">
            <div className="font-bold text-purple-300">⭐ Răspunsuri întrebări bonus</div>
            <div className="text-xs text-stone-400 mt-1">Completează pe parcursul/la finalul turneului. Punctele se acordă automat.</div>
          </div>

          <div className="space-y-3">
            <AdminBonusField label="🏆 Câștigătorul turneului" pts={BONUS_POINTS.champion}>
              <select value={pending.champion || ""} onChange={(e) => update("champion", e.target.value)} style={inputStyleObj}>
                <option value="">— nu s-a stabilit încă —</option>
                {TEAMS.map((t) => <option key={t.name} value={t.name}>{t.flag} {t.name}</option>)}
              </select>
            </AdminBonusField>

            <AdminBonusField label="🥈 Finalista învinsă" pts={BONUS_POINTS.finalist}>
              <select value={pending.finalist || ""} onChange={(e) => update("finalist", e.target.value)} style={inputStyleObj}>
                <option value="">— nu s-a stabilit încă —</option>
                {TEAMS.map((t) => <option key={t.name} value={t.name}>{t.flag} {t.name}</option>)}
              </select>
            </AdminBonusField>

            <AdminBonusField label="⚽ Golgheter turneu" pts={BONUS_POINTS.topScorer}>
              <input value={pending.topScorer || ""} onChange={(e) => update("topScorer", e.target.value)} placeholder="ex: Kylian Mbappé (Franța)" style={inputStyleObj} />
              <div className="text-[10px] text-stone-500 mt-1.5 font-mono">Match case-insensitive. Folosește exact formatul din listă pentru a match-ui cu jucătorii.</div>
            </AdminBonusField>

            <AdminBonusField label="✨ Echipa surpriză" pts={BONUS_POINTS.surprise}>
              <select value={pending.surprise || ""} onChange={(e) => update("surprise", e.target.value)} style={inputStyleObj}>
                <option value="">— nu s-a stabilit încă —</option>
                {TEAMS.filter((t) => !FAVORITE_TEAMS.includes(t.name)).map((t) => <option key={t.name} value={t.name}>{t.flag} {t.name}</option>)}
              </select>
            </AdminBonusField>

            <AdminBonusField label="🥅 Goluri primite în grupe" pts={BONUS_POINTS.mostGoalsAgainst}>
              <select value={pending.mostGoalsAgainst || ""} onChange={(e) => update("mostGoalsAgainst", e.target.value)} style={inputStyleObj}>
                <option value="">— nu s-a stabilit încă —</option>
                {TEAMS.map((t) => <option key={t.name} value={t.name}>{t.flag} {t.name}</option>)}
              </select>
            </AdminBonusField>
          </div>

          {dirty && (
            <div className="sticky bottom-4 flex justify-end">
              <button type="button" onClick={save} className="bg-amber-400 text-stone-950 px-6 py-3 rounded-lg font-black hover:bg-amber-300 transition flex items-center gap-2 shadow-2xl shadow-amber-500/30" style={{fontFamily:'"Bebas Neue", sans-serif', letterSpacing:"0.2em"}}>💾 SALVEAZĂ BONUS</button>
            </div>
          )}
        </div>
      );
    }

    function AdminBonusField(props) {
      return (
        <div className="bg-stone-900/60 border border-stone-800 rounded-xl p-4">
          <div className="flex items-center justify-between mb-3">
            <div className="font-bold text-sm">{props.label}</div>
            <div className="text-xs text-purple-300 font-bold">+{props.pts} pct</div>
          </div>
          {props.children}
        </div>
      );
    }

    function AdminSettings(props) {
      const { config, saveConfig, showToast } = props;
      const [scoring, setScoring] = useState(config.scoring);
      const [deadline, setDeadline] = useState(config.deadline);
      const [pwd, setPwd] = useState(config.adminPassword);
      const save = async () => {
        const ok = await saveConfig({ ...config, scoring: { ...scoring, wrong: 0 }, deadline, adminPassword: pwd });
        if (ok) showToast("Setări salvate cu succes!");
      };
      return (
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div className="bg-stone-900/60 border border-stone-800 rounded-xl p-6 space-y-5">
            <h3 className="font-black tracking-widest text-lg" style={{fontFamily:'"Bebas Neue", sans-serif', letterSpacing:"0.15em"}}>PUNCTAJE</h3>
            <div className="space-y-3">
              <SettingsRow label="Scor exact" desc="2-1 → 2-1" value={scoring.exact} onChange={(v) => setScoring({...scoring, exact: +v || 0})} accent="amber" />
              <SettingsRow label="Diferență de gol" desc="2-1 → 3-2" value={scoring.diff} onChange={(v) => setScoring({...scoring, diff: +v || 0})} accent="emerald" />
              <SettingsRow label="Rezultat 1/X/2" desc="2-1 → 4-0" value={scoring.outcome} onChange={(v) => setScoring({...scoring, outcome: +v || 0})} accent="sky" />
            </div>
          </div>
          <div className="bg-stone-900/60 border border-stone-800 rounded-xl p-6 space-y-5">
            <h3 className="font-black tracking-widest text-lg" style={{fontFamily:'"Bebas Neue", sans-serif', letterSpacing:"0.15em"}}>DEADLINE & SECURITATE</h3>
            <div><Label>DEADLINE PRONOSTICURI</Label><input type="datetime-local" value={deadline} onChange={(e) => setDeadline(e.target.value)} style={inputStyleObj} /><div className="text-xs text-stone-500 mt-1">După această oră jucătorii nu mai pot edita.</div></div>
            <div><Label>PAROLĂ ADMIN</Label><input type="password" value={pwd} onChange={(e) => setPwd(e.target.value)} style={inputStyleObj} autoComplete="new-password" /></div>
          </div>
          <button type="button" onClick={save} className="lg:col-span-2 bg-amber-400 text-stone-950 px-6 py-3 rounded-lg font-black hover:bg-amber-300 transition flex items-center justify-center gap-2" style={{fontFamily:'"Bebas Neue", sans-serif', letterSpacing:"0.2em"}}>💾 SALVEAZĂ SETĂRILE</button>
        </div>
      );
    }

    function SettingsRow(props) {
      const colors = { amber: "#fbbf24", emerald: "#10b981", sky: "#0ea5e9" };
      return (
        <div className="flex items-center justify-between gap-3">
          <div><div className="font-bold text-sm">{props.label}</div><div className="text-[11px] text-stone-500 font-mono">{props.desc}</div></div>
          <input type="number" inputMode="numeric" min="0" max="20" value={props.value} onChange={(e) => props.onChange(e.target.value)} className="w-20 text-center rounded-md py-2 font-black text-xl bg-stone-950 border-2 outline-none" style={{fontFamily:'"Bebas Neue", sans-serif', borderColor: colors[props.accent], color: colors[props.accent], WebkitAppearance:"none"}} />
        </div>
      );
    }

    function AdminPlayers(props) {
      const { players, deletePlayer, askConfirm, showToast } = props;
      const remove = (name) => {
        askConfirm("ȘTERGE JUCĂTOR", "Sigur vrei să ștergi jucătorul \"" + name + "\"? Toate pronosticurile lui vor fi pierdute.",
          async () => { const ok = await deletePlayer(name); if (ok) showToast("Jucătorul \"" + name + "\" a fost șters."); }, true);
      };
      return (
        <div className="bg-stone-900/60 border border-stone-800 rounded-xl overflow-hidden">
          <div className="px-4 py-3 border-b border-stone-800 bg-stone-950/50 text-xs tracking-widest text-stone-500 font-mono">{players.length} JUCĂTORI ÎNSCRIȘI</div>
          {players.length === 0 ? <div className="p-8 text-center text-stone-500">Niciun jucător încă.</div>
          : players.map((p) => {
            const completed = MATCHES.filter((m) => p.predictions && p.predictions[m.n] && p.predictions[m.n].g1 !== "" && p.predictions[m.n].g2 !== "" && p.predictions[m.n].g1 != null && p.predictions[m.n].g2 != null).length;
            const bonusFields = ["champion", "finalist", "topScorer", "surprise", "mostGoalsAgainst"];
            const bonusFilled = p.bonus ? bonusFields.filter((f) => p.bonus[f]).length : 0;
            return (
              <div key={p.name} className="px-4 py-3 border-b border-stone-800 last:border-0 flex items-center justify-between gap-4">
                <div><div className="font-bold">{p.name}</div><div className="text-xs text-stone-500 font-mono">{completed}/72 meciuri · {bonusFilled}/5 bonus</div></div>
                <button type="button" onClick={() => remove(p.name)} className="text-red-400 hover:text-red-300 p-2 rounded hover:bg-red-500/10" title="Șterge">🗑</button>
              </div>
            );
          })}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
